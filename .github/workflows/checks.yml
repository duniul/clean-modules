name: 🕵️ Checks

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '.vscode/**'
      - 'images/**'
      - '.gitattributes'
      - '.gitignore'
      - '*.md'
      - 'LICENSE'

permissions:
  contents: read

jobs:
  build:
    name: 🧱 Check and build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v6

      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🧹 Stylecheck project
        run: pnpm stylecheck

      - name: 🧹 Typecheck project
        run: pnpm typecheck

      - name: 🧱 Build project
        run: pnpm build

  test:
    name: 🧪 Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v6

      - name: 🏗 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 🏗 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🧪 Run tests
        run: pnpm test
